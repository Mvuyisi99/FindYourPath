<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareerPath | Register</title>
  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="register.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="register-page">
  <div class="register-container">
    <!-- LEFT: Form Card -->
    <div class="form-card">
      <h2>Register</h2>
      <form id="registerForm">
        <input type="text" id="fullname" placeholder="Full Name and Surname" required>
        <select id="role" required>
          <option value="" disabled selected>Role</option>
          <option>Student</option>
          <option>Mentor</option>
          <option>Admin</option>
          <option>Career Changer</option>
        </select>
        <input type="text" id="cell" placeholder="Cell number" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
        <button type="submit">Submit</button>
      </form>
    </div>

    <!-- RIGHT: Picture + Login Link -->
    <div class="right-section">
     <!-- Replace with your own image -->
<img src="PROJECT.png" alt="Career illustration" class="registration-image">
<p class="login-link">Already have an account? <a href="#" id="toggle-login-link">Login</a></p>
    </div>
  </div>

  <!-- Login Modal (hidden by default) -->
  <div id="login-modal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2>Login</h2>
      <form id="loginForm">
        <input type="email" id="login-email" placeholder="Email" required>
        <input type="password" id="login-password" placeholder="Password" required>
        <button type="submit">Login</button>
      </form>
    </div>
  </div>
 <!-- Custom toast for success message -->
  <div id="custom-toast" class="toast-message">✅ Registration successful!</div>

  <script src="script.js"></script>
</body>
</html>
