<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password</title>

  <!-- Font Awesome -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Inter',sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      position:relative;

      background:
      linear-gradient(
      135deg,
      #02254b 0%,
      #03264c 40%,
      #02254b 100%);
    }

    /* GREEN GLOW */
    body::before{
      content:"";
      position:absolute;

      width:850px;
      height:850px;

      background:
      radial-gradient(circle,
      rgba(72,255,94,0.30) 0%,
      rgba(72,255,94,0.12) 25%,
      rgba(72,255,94,0.05) 40%,
      transparent 70%);

      filter:blur(60px);

      transform:scale(1.15);

      z-index:0;
    }

    /* TRIANGLE / X LIGHT EFFECT */
    body::after{
      content:"";
      position:absolute;
      width:140%;
      height:140%;

      background:

      /* LEFT TRIANGLE */
      linear-gradient(
          45deg,
          transparent 0%,
          transparent 42%,
          rgba(0,255,120,0.10) 50%,
          transparent 58%,
          transparent 100%
      ),

      /* RIGHT TRIANGLE */
      linear-gradient(
          -45deg,
          transparent 0%,
          transparent 42%,
          rgba(0,255,120,0.10) 50%,
          transparent 58%,
          transparent 100%
      ),

      /* TOP TRIANGLE */
      linear-gradient(
          135deg,
          transparent 0%,
          transparent 42%,
          rgba(0,255,120,0.08) 50%,
          transparent 58%,
          transparent 100%
      ),

      /* BOTTOM TRIANGLE */
      linear-gradient(
          -135deg,
          transparent 0%,
          transparent 42%,
          rgba(0,255,120,0.08) 50%,
          transparent 58%,
          transparent 100%
      );

      background-size:100% 100%;

      opacity:0.9;

      filter:blur(10px);

      transform:scale(1.2);

      z-index:1;
    }

    .reset-container{
      width:400px;
      padding:35px 40px;
      border-radius:14px;

      background:rgba(255,255,255,0.28);
      backdrop-filter:blur(6px);

      box-shadow:
      0 8px 25px rgba(0,0,0,0.2);

      display:flex;
      flex-direction:column;
      align-items:center;

      position:relative;
      z-index:10;
    }

    .profile-icon{
      width:88px;
      height:88px;
      border-radius:50%;
      background:#ddd0f1;

      display:flex;
      justify-content:center;
      align-items:center;

      margin-bottom:25px;
    }

    .profile-icon i{
      font-size:42px;
      color:#0b2d4f;
    }

    form{
      width:100%;
    }

    .input-group{
      margin-bottom:18px;
    }

    .input-group label{
      display:block;
      font-size:15px;
      font-weight:700;
      color:#000;
      margin-bottom:8px;
    }

    .input-group input{
      width:100%;
      border:none;
      outline:none;

      background:rgba(255,255,255,0.18);

      padding:12px 10px;

      border-bottom:4px solid #0b2d4f;

      font-size:15px;
      color:#111;
    }

    .input-group input::placeholder{
      color:#444;
    }

    .reset-btn{
      width:65%;
      margin:20px auto 10px;
      display:block;

      border:none;
      outline:none;

      background:#66b032;
      color:white;

      padding:12px;
      border-radius:30px;

      font-size:24px;
      font-weight:700;

      cursor:pointer;
      transition:0.3s;
    }

    .reset-btn:hover{
      background:#5aa02c;
      transform:scale(1.03);
    }

    .bottom-text{
      margin-top:12px;
      text-align:center;
      font-size:15px;
      color:#123;
      font-weight:600;
    }

    .bottom-text a{
      text-decoration:none;
      color:#0077ff;
      font-weight:700;
    }

    .bottom-text a:hover{
      text-decoration:underline;
    }

    /* Responsive */
    @media(max-width:480px){

      .reset-container{
        width:90%;
        padding:30px 22px;
      }

      .reset-btn{
        width:100%;
      }
    }

  </style>
</head>
<body>

  <div class="reset-container">

    <div class="profile-icon">
      <i class="fa-regular fa-user"></i>
    </div>

    <form>

      <div class="input-group">
        <label>Email:</label>
        <input type="email">
      </div>

      <div class="input-group">
        <label>New Password:</label>
        <input type="password">
      </div>

      <div class="input-group">
        <label>Retype Password:</label>
        <input type="password">
      </div>

      <button type="submit" class="reset-btn">
        Reset
      </button>

    </form>

    <div class="bottom-text">
      Dont have an account yet?
      <a href="#">Register</a>
    </div>

  </div>

</body>
</html>
